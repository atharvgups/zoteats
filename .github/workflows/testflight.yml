# Manual TestFlight release: archive the app and upload it to App Store Connect.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   APP_STORE_CONNECT_API_KEY_P8  - base64-encoded contents of the App Store Connect API .p8 key
#                                   (base64 -w0 AuthKey_XXXXXXXXXX.p8)
#   APP_STORE_CONNECT_KEY_ID      - the API key's Key ID (e.g. XXXXXXXXXX)
#   APP_STORE_CONNECT_ISSUER_ID   - the API key's Issuer ID (UUID from App Store Connect)
#   APPLE_TEAM_ID                 - Apple Developer Team ID (e.g. ABCDE12345)
#
# No manual certificate/profile import is needed: signing uses Xcode cloud signing
# (-allowProvisioningUpdates + the App Store Connect API key), which creates and
# downloads the distribution certificate and profile on the runner as needed.
name: TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "MARKETING_VERSION (CFBundleShortVersionString)"
        required: false
        default: "1.0.0"
      build_number:
        description: "CURRENT_PROJECT_VERSION (defaults to the workflow run number)"
        required: false
        default: ""
  # Git-native trigger: pushing a tag like "testflight-1.0.0" uploads that version.
  push:
    tags: ["testflight-*"]

jobs:
  release:
    name: Archive and upload to TestFlight
    runs-on: macos-15
    env:
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      # Fail fast with an explicit list of missing secrets instead of a cryptic
      # xcodebuild signing error 20 minutes in.
      - name: Check required secrets
        run: |
          missing=()
          for name in APP_STORE_CONNECT_API_KEY_P8 APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "Add them under Settings -> Secrets and variables -> Actions (see comments at the top of this workflow)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      # Signing strategy for device-less accounts: the ARCHIVE stays unsigned
      # (automatic development signing fails with "team has no devices"), and the
      # EXPORT step performs the full App Store distribution signing via cloud
      # certificates (-allowProvisioningUpdates + the ASC API key). Only the team
      # id needs to be present in the project.
      - name: Configure team in project spec
        run: |
          sed -i '' "s/DEVELOPMENT_TEAM: \"\"/DEVELOPMENT_TEAM: \"$APPLE_TEAM_ID\"/" apple/project.yml

      # The Xcode project is not committed; generate it from the spec.
      - name: Generate Xcode project
        run: xcodegen generate --spec apple/project.yml --project apple/

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_P8" | base64 --decode \
            > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      # DEVELOPMENT_TEAM / CODE_SIGNING_ALLOWED are passed on the command line, which
      # overrides the CI-friendly defaults in apple/project.yml (empty team, signing off).
      - name: Archive
        env:
          INPUT_VERSION: ${{ inputs.marketing_version }}
          BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
        run: |
          set -o pipefail
          # Version precedence: explicit dispatch input, else the tag name
          # ("testflight-1.2.0" -> 1.2.0), else 1.0.0.
          if [ -n "$INPUT_VERSION" ]; then
            MARKETING_VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF_NAME" == testflight-* ]]; then
            MARKETING_VERSION="${GITHUB_REF_NAME#testflight-}"
          else
            MARKETING_VERSION="1.0.0"
          fi
          echo "Uploading version $MARKETING_VERSION ($BUILD_NUMBER)"
          # Unsigned archive; all signing happens at export (see comment above).
          xcodebuild \
            -project apple/ZotEats.xcodeproj \
            -scheme ZotEats \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ZotEats.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

      # method app-store-connect + destination upload (Xcode 15+) signs the archive
      # and uploads it straight to App Store Connect in one step — no altool/Transporter.
      - name: Export and upload to App Store Connect
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/ZotEats.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
