# XcodeGen spec — the Xcode project is generated on demand (locally or in CI)
# with `xcodegen generate`, so no .xcodeproj lives in git.
name: ZotEats
options:
  bundleIdPrefix: com.atharvgupta
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ZotEatsKit:
    path: ZotEatsKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  ZotEats:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: ZotEatsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atharvgupta.zoteats
        PRODUCT_NAME: ZotEats
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ZotEats
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "NO"
