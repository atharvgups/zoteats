# XcodeGen spec — the Xcode project is generated on demand (locally or in CI)
# with `xcodegen generate`, so no .xcodeproj lives in git.
name: ZotEats
options:
  bundleIdPrefix: com.atharvgupta
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  ZotEatsKit:
    path: ZotEatsKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

schemes:
  ZotEats:
    build:
      targets:
        ZotEats: all
        ZotEatsUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ZotEatsUITests

targets:
  ZotEats:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: ZotEatsKit
      - target: ZotEatsWidgets
    # Explicit Info.plist (replaces GENERATE_INFOPLIST_FILE): background refresh
    # and Live Activities need array/dict keys the generated plist can't express.
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ZotEats
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        UIBackgroundModes: [fetch]
        BGTaskSchedulerPermittedIdentifiers: [com.atharvgupta.zoteats.refresh]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atharvgupta.zoteats
        PRODUCT_NAME: ZotEats
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "NO"

  ZotEatsWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
    dependencies:
      - package: ZotEatsKit
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: ZotEats
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atharvgupta.zoteats.widgets
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "NO"
        SKIP_INSTALL: YES

  ZotEatsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: ZotEats
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atharvgupta.zoteats.uitests
        TEST_TARGET_NAME: ZotEats
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "NO"
